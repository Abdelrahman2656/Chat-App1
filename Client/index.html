<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chat</title>
    
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Phosphor Icons (Modern aesthetic icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="client.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-container card shadow-lg p-0">
            <!-- Header -->
            <div class="chat-header p-3 d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <div class="header-avatar position-relative">
                        <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-chat/ava3-bg.webp" alt="Group Avatar">
                        <span class="online-badge"></span>
                    </div>
                    <div>
                        <h5 class="mb-0 text-white fw-bold">Global Lounge</h5>
                        <small class="text-white-50"><i class="ph-fill ph-circle text-success" style="font-size:0.6rem;"></i> Connected</small>
                    </div>
                </div>
                <div class="header-actions text-white gap-2 d-flex">
                    <button class="btn btn-icon"><i class="ph ph-video-camera"></i></button>
                    <button class="btn btn-icon"><i class="ph ph-phone"></i></button>
                    <button class="btn btn-icon"><i class="ph ph-dots-three-vertical"></i></button>
                </div>
            </div>

            <!-- Chat Body (IMPORTANT: client.js targets .card-body to insert messages) -->
            <div class="card-body chat-body position-relative pb-4">
                
                <!-- Welcome Message Start -->
                <div class="text-center w-100 my-4 message-container-welcome">
                     <span class="badge rounded-pill badge-glass">Today</span>
                     <p class="text-muted mt-2" style="font-size: 0.85rem;">Welcome to the real-time chat. Messages are end-to-end encrypted.</p>
                </div>

                <!-- Messages will be injected here by client.js using .message-container classes -->

                <!-- Typing Indicator Wrapper -->
                <div id="typing-indicator" class="typing-indicator-wrapper">
                    <div class="typing-glass">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>

            </div>

            <!-- Footer / Input Area -->
            <div class="chat-footer p-3">
                <div class="input-group-modern d-flex align-items-center gap-2">
                    <button class="btn btn-action-icon text-muted"><i class="ph ph-paperclip"></i></button>
                    <button class="btn btn-action-icon text-muted"><i class="ph ph-smiley"></i></button>
                    
                    <!-- Input field targeted by client.js using ID chatInput -->
                    <input type="text" id="chatInput" class="form-control chat-input" placeholder="Type a message..." autocomplete="off">
                    
                    <!-- Send button triggers sendMsg() -->
                    <button onclick="sendMsg()" class="btn btn-send"><i class="ph-fill ph-paper-plane-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
